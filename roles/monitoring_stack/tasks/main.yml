---
# 1. 디렉토리 생성 및 권한 설정
- name: 모니터링 시스템을 위한 디렉토리 생성
  become: yes
  file:
    path: "{{ item.path }}"
    state: directory
    owner: "{{ item.owner }}"
    group: "{{ item.owner }}"
    mode: '0755'
  loop:
    - { path: '/etc/prometheus', owner: 'root' }
    - { path: '/etc/grafana/provisioning/dashboards', owner: '472' }
    - { path: '/etc/grafana/provisioning/datasources', owner: '472' }
    - { path: '/home/vagrant/prometheus_data', owner: '65534' }
    - { path: '/home/vagrant/grafana_data', owner: '472' }
    - { path: '/home/vagrant/grafana_dashboards', owner: '472' }

# 2. 설정 파일 배포
- name: 프로메테우스 설정 파일 복사
  template:
    src: prometheus.yml.j2
    dest: /etc/prometheus/prometheus.yml

- name: 그라파나 데이터 소스 설정 복사
  template:
    src: datasources.yml.j2
    dest: /etc/grafana/provisioning/datasources/datasources.yml

- name: 그라파나 대시보드 프로비저닝 설정 복사
  template:
    src: dashboards.yml.j2
    dest: /etc/grafana/provisioning/dashboards/dashboards.yml

# 3. 대시보드 템플릿 다운로드 및 전처리
- name: 그라파나 대시보드 템플릿 미리 다운로드
  get_url:
    url: "https://grafana.com/api/dashboards/{{ item.id }}/revisions/{{ item.revision }}/download"
    dest: "/home/vagrant/grafana_dashboards/{{ item.name }}.json"
    owner: '472'
    group: '472'
    mode: '0644'
  loop: "{{ grafana_dashboards }}"
  register: dashboard_download

- name: "K3S 대시보드 Job 이름표 최종 매칭"
  become: true
  replace:
    path: "/home/vagrant/grafana_dashboards/k3s_cluster.json"
    regexp: '{{ item.regexp }}'
    replace: '{{ item.replace }}'
  loop:
    # 1. 노드 정보 매칭: node-exporter -> kubernetes-nodes-exporter
    - { regexp: '\"job\": \"node-exporter\"', replace: '\"job\": \"kubernetes-nodes-exporter\"' }
    # 2. 컨테이너 정보 매칭: kubernetes-nodes (기본값 유지 또는 확인)
    - { regexp: '\"job\": \"kubernetes-nodes\"', replace: '\"job\": \"kubernetes-nodes\"' }
    # 3. 데이터소스 강제 지정
    - { regexp: '\$\{?DS_PROMETHEUS\}?', replace: 'prometheus' }
  when: grafana_dashboards is defined

# 4. 프로메테우스 컨테이너 실행
- name: 프로메테우스 컨테이너 실행
  docker_container:
    name: prometheus
    image: prom/prometheus:latest
    state: started
    etc_hosts:
      host.docker.internal: "host-gateway"
    restart_policy: always
    recreate: yes
    ports:
      - "9090:9090"
    volumes:
      - "/etc/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml"
      - "/home/vagrant/prometheus_data:/prometheus"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-remote-write-receiver"
      - "--web.listen-address=:9090"

# 5. 그라파나 컨테이너 실행
- name: 그라파나 컨테이너 실행
  docker_container:
    name: grafana
    image: grafana/grafana:latest
    state: started
    restart_policy: always
    recreate: true
    ports:
      - "3000:3000"
    volumes:
      - "/home/vagrant/grafana_data:/var/lib/grafana"
      - "/home/vagrant/grafana_dashboards:{{ grafana_dashboards_dir }}"
      - "/etc/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards"
      - "/etc/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources"
    env:
      GF_SECURITY_ADMIN_PASSWORD: "1234"
      GF_USERS_DEFAULT_THEME: "light"

# 6. 노드 익스포터 실행
- name: 노드 익스포터(Node Exporter) 컨테이너 실행
  docker_container:
    name: node-exporter
    image: prom/node-exporter:latest
    state: started
    restart_policy: always
    network_mode: host
    pid_mode: host
    volumes:
      - "/:/host:ro,rslave"
    command:
      - '--path.rootfs=/host'