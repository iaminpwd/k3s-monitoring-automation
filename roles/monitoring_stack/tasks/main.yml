---
# 0. 자동 리셋 로직: 폴더 존재 여부를 확인하고 있으면 삭제합니다.
- name: "그라파나 데이터 폴더 상태 확인"
  stat:
    path: "/home/vagrant/grafana_data"
  register: grafana_dir_stat

- name: "기존 그라파나 데이터가 존재할 경우 자동 삭제 (클린 리셋)"
  become: yes
  file:
    path: "/home/vagrant/grafana_data"
    state: absent
  when: grafana_dir_stat.stat.exists

# 1. 디렉토리 생성 및 권한 설정 (삭제된 경우 여기서 다시 깨끗하게 생성됨)
- name: 모니터링 시스템을 위한 디렉토리 생성
  become: yes
  file:
    path: "{{ item.path }}"
    state: directory
    owner: "{{ item.owner }}"
    group: "{{ item.owner }}"
    mode: '0755'
  loop:
    - { path: '/etc/prometheus', owner: 'root' }
    - { path: '/etc/grafana/provisioning/dashboards', owner: '472' }
    - { path: '/etc/grafana/provisioning/datasources', owner: '472' }
    - { path: '/etc/grafana/provisioning/alerting', owner: '472' }
    - { path: '/home/vagrant/prometheus_data', owner: '65534' }
    - { path: '/home/vagrant/grafana_data', owner: '472' }
    - { path: '/home/vagrant/grafana_dashboards', owner: '472' }

- name: "커스텀 대시보드 JSON 파일 전송"
  copy:
    src: files/custom_dashboard.json
    dest: /home/vagrant/grafana_dashboards/custom_dashboard.json
    owner: '472'
    group: '472'
    mode: '0644'

# 2. 설정 파일 배포
- name: 프로메테우스 메인 설정 파일 복사
  template:
    src: prometheus.yml.j2
    dest: /etc/prometheus/prometheus.yml

- name: "그라파나 전용 알람(Alerting) 프로비저닝 파일 복사"
  template:
    src: alerting.yml.j2
    dest: /etc/grafana/provisioning/alerting/alerting.yml

- name: 그라파나 데이터 소스 설정 복사
  template:
    src: datasources.yml.j2
    dest: /etc/grafana/provisioning/datasources/datasources.yml

- name: 그라파나 대시보드 프로비저닝 설정 복사
  template:
    src: dashboards.yml.j2
    dest: /etc/grafana/provisioning/dashboards/dashboards.yml

# 3. 대시보드 템플릿 다운로드 및 전처리 (중복 제거를 위해 recreate 옵션 활용 가능)
- name: 그라파나 대시보드 템플릿 미리 다운로드
  get_url:
    url: "https://grafana.com/api/dashboards/{{ item.id }}/revisions/{{ item.revision }}/download"
    dest: "/home/vagrant/grafana_dashboards/{{ item.name }}.json"
    owner: '472'
    group: '472'
    mode: '0644'
  loop: "{{ grafana_dashboards }}"
  register: dashboard_download
  when: grafana_dashboards is defined

- name: "모든 대시보드의 데이터소스 변수 통합 치환"
  replace:
    path: "/home/vagrant/grafana_dashboards/{{ item }}.json"
    regexp: '\$\{?DS_PROMETHEUS\}?'
    replace: 'prometheus'
  loop:
    - k3s_cluster
    - mysql
    - nginx
    - custom_dashboard
  when: grafana_dashboards is defined

- name: "대시보드별 개별 Job 이름표 매칭"
  replace:
    path: "/home/vagrant/grafana_dashboards/{{ item.file }}.json"
    regexp: '"job": "({{ item.old_job }})"'
    replace: '"job": "{{ item.new_job }}"'
  loop:
    - { file: 'k3s_cluster', old_job: 'node-exporter', new_job: 'kubernetes-nodes-exporter' }
    - { file: 'mysql', old_job: 'mysql|mysqld_exporter', new_job: 'mysql-exporter' }
    - { file: 'nginx', old_job: 'nginx-vts-exporter', new_job: 'nginx-exporter' }
  when: grafana_dashboards is defined

# 4. 프로메테우스 컨테이너 실행
- name: 프로메테우스 컨테이너 실행
  docker_container:
    name: prometheus
    image: prom/prometheus:latest
    state: started
    etc_hosts:
      host.docker.internal: "host-gateway"
    restart_policy: always
    recreate: yes
    ports:
      - "9090:9090"
    volumes:
      - "/etc/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml"
      - "/home/vagrant/prometheus_data:/prometheus"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-remote-write-receiver"
      - "--web.listen-address=:9090"

# 5. 그라파나 컨테이너 실행 (항상 recreate로 새 설정 반영)
- name: 그라파나 컨테이너 실행
  docker_container:
    name: grafana
    image: grafana/grafana:latest
    state: started
    restart_policy: always
    recreate: true
    ports:
      - "3000:3000"
    volumes:
      - "/home/vagrant/grafana_data:/var/lib/grafana"
      - "/home/vagrant/grafana_dashboards:/var/lib/grafana/dashboards"
      - "/etc/grafana/provisioning:/etc/grafana/provisioning"
    env:
      GF_SECURITY_ADMIN_PASSWORD: "1234"
      GF_USERS_DEFAULT_THEME: "light"

# 6. 노드 익스포터 실행
- name: 노드 익스포터(Node Exporter) 컨테이너 실행
  docker_container:
    name: node-exporter
    image: prom/node-exporter:latest
    state: started
    restart_policy: always
    network_mode: host
    pid_mode: host
    volumes:
      - "/:/host:ro,rslave"
    command:
      - '--path.rootfs=/host'