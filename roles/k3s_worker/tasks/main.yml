---
- name: K3s 워커(Agent) 설치 및 설정 업데이트
  shell: |
    curl -sfL https://get.k3s.io | K3S_URL=https://192.168.56.10:6443 \
    K3S_TOKEN={{ join_token }} sh -s - agent \
    --node-ip={{ ansible_host }} \
    --flannel-iface=eth1
  # [핵심] 아래 creates 부분을 지워야 앤서블이 옵션을 다시 씁니다.
  # args:
  #   creates: /usr/local/bin/k3s 
  register: k3s_agent_install_result
  notify: restart k3s-agent